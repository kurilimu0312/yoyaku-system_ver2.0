    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-2xl transition transform translate-y-20 opacity-0 pointer-events-none duration-300 z-50"><span id="toast-msg"></span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, getDocs, writeBatch, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let reservations = [];
        let currentUser = null;
        let lastArrivalState = {}; 
        let db = null; let auth = null; let appId = 'default-app-id';
        let unsubscribeRealtime = null;

        // 🌟 予定－料金クラスコード抽出用のマッピング定義を追加
        const headerKeywords = {
            time: ["出発予定年月日時分", "予約時間", "時間"],
            bookingNo: ["予約番号", "予約Ｎｏ", "予約NO", "予約No"],
            company: ["借受人名", "お客様名", "会社名"],
            name: ["配車予定住所", "配車住所"],
            carClass: ["予定－料金クラスコード", "料金クラスコード", "クラスコード", "クラス"], // 🌟追加
            carType: ["車名", "車種"],
            carNum: ["登録№（表示用）", "車番"],
            stock: ["在庫営業店舗名", "在庫営業店舗", "在庫"],
            memo: ["連絡事項", "備考"],
            returnStore: ["帰着予定営業店舗名", "返却店舗"],
            attach1: ["添付品個数１", "添付品個数1", "添付品名１", "添付品名1", "個数１", "個数1"],
            attach2: ["添付品個数２", "添付品個数2", "添付品名２", "添付品名2", "個数２", "個数2"],
            attach3: ["添付品個数３", "添付品個数3", "添付品名３", "添付品名3", "個数３", "個数3"]
        };

        // 🌟 特定クラスを赤字にするかどうかの判定用配列
        const redClasses = ["C3-K", "C4-K", "C5-K", "SP1-K", "W3-K", "W4-K", "SUV3K", "SUV4K", "ZE3-K"];

        function checkNotificationSystem() {
            const bellArea = document.getElementById('mobile-bell-area');
            if ('Notification' in window) {
                bellArea.classList.remove('hidden');
                if (Notification.permission === 'granted') {
                    bellArea.innerHTML = `<span class="text-xs font-bold text-emerald-400 bg-emerald-950 px-3 py-1.5 rounded-xl border border-emerald-900"><i class="fa-solid fa-circle-check"></i> スマホ通知連動中</span>`;
                }
            }
        }

        window.requestMobileNotification = function() {
            Notification.requestPermission().then(p => {
                if (p === 'granted') {
                    new Notification("CLOUD PRO", { body: "通知連動テストに成功しました！" });
                    checkNotificationSystem();
                }
            });
        };

        function firePushNotification(name) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification("【CLOUD PRO】来店通知", { body: `${name} 様がご来店されました。`, tag: "visit-alert", renotify: true });
                if ('vibrate' in navigator) navigator.vibrate([300, 100, 300]);
            }
        }

        window.forceSyncCloudData = async function() {
            document.getElementById('sync-indicator').textContent = "⚡ 強制同期中...";
            document.getElementById('sync-indicator').className = "text-[10px] text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-lg font-bold animate-pulse";
            try {
                const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
                const querySnapshot = await getDocs(collectionRef);
                const updated = [];
                querySnapshot.forEach((doc) => { updated.push({ id: doc.id, ...doc.data() }); });
                reservations = updated; renderTable(); updateStats();
                showToast("クラウドと強制同期しました！最新状態です。");
            } catch (error) {
                showToast("同期に失敗しました。");
            } finally {
                document.getElementById('sync-indicator').className = "text-[10px] text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-lg font-bold";
                document.getElementById('sync-indicator').textContent = "クラウド共有LIVE";
            }
        };

        function setupEnvironment() {
            appId = firebaseConfig.projectId;
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app); db = getFirestore(app);
            checkNotificationSystem();
        }

        function initRealtimeSync() {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
                    if (unsubscribeRealtime) unsubscribeRealtime();
                    unsubscribeRealtime = onSnapshot(collectionRef, (snapshot) => {
                        const updated = [];
                        snapshot.forEach((doc) => { updated.push({ id: doc.id, ...doc.data() }); });
                        
                        updated.forEach(item => {
                            if (item.arrival && item.arrivalTimestamp) {
                                if (!lastArrivalState[item.id]) {
                                    playSynthSound();
                                    firePushNotification(item.company || "新規お客様");
                                }
                            }
                            lastArrivalState[item.id] = item.arrival;
                        });

                        reservations = updated; renderTable(); updateStats();
                    });
                }
            });
        }

        function cleanTimeFormat(t) {
            if (!t) return '99:99';
            let match = t.match(/(\d{1,2}):(\d{2})/);
            if (match) {
                let h = match[1].padStart(2, '0');
                let m = match[2];
                return `${h}:${m}`;
            }
            return t.trim().padStart(5, '0');
        }

        function removeAllSpaces(str) {
            if (!str) return 'ー';
            return str.replace(/[\s\u3000\u00A0\u2002\u2003\u2009]+/g, '').trim();
        }

        function formatAttachValue(val) {
            if (!val) return "ー";
            const trimmed = val.trim();
            if (trimmed === "" || trimmed === "0" || trimmed === "０" || trimmed === "ー") return "ー";
            
            const normalized = trimmed.replace(/[０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            if (/^[1-9][0-9]*$/.test(normalized)) {
                return "×" + normalized;
            }
            return trimmed;
        }

        function sortData(list) {
            return [...list].sort((a, b) => {
                const aDep = a.departure ? 1 : 0; const bDep = b.departure ? 1 : 0;
                if (aDep !== bDep) return aDep - bDep;

                if (a.arrival && b.arrival) {
                    return (a.arrivalTimestamp || 0) - (b.arrivalTimestamp || 0);
                }
                if (a.arrival && !b.arrival) return -1;
                if (!a.arrival && b.arrival) return 1;

                return cleanTimeFormat(a.time).localeCompare(cleanTimeFormat(b.time));
            });
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const rowCount = document.getElementById('row-count');
            if (!tbody) return; tbody.innerHTML = '';
            rowCount.textContent = reservations.length;
            const sorted = sortData(reservations);
            sorted.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = `row-hover border-b ${item.departure ? 'bg-slate-100 text-slate-400' : item.arrival ? 'bg-emerald-50 text-slate-800 border-l-[5px] border-emerald-500' : 'bg-white'}`;
                
                const currentStock = item.stock || '';
                const isHiroba = currentStock === '広場' || currentStock === '西口広場前店';
                
                let stockTextColor = 'text-slate-800 text-center font-normal';
                if (currentStock && currentStock !== 'ー' && !isHiroba) {
                    stockTextColor = 'text-rose-600 text-center font-normal'; 
                } else if (isHiroba) {
                    stockTextColor = 'text-slate-900 text-center font-normal'; 
                }
                if (item.departure) stockTextColor = 'text-slate-400/75 text-center font-normal';

                const fixedOptions = ["広場", "Ｄ", "ﾘｯﾄP", "ママカリＰ", "広場3P", "新保"];
                let stockSelectHTML = `<select onchange="updateField('${item.id}', 'stock', this.value)" class="w-full h-8 bg-transparent cursor-pointer ${stockTextColor}">`;
                
                if (currentStock === '' || currentStock === 'ー' || fixedOptions.includes(currentStock)) {
                    stockSelectHTML += `<option value="">ー</option>`;
                    fixedOptions.forEach(opt => {
                        const selected = currentStock === opt ? 'selected' : '';
                        stockSelectHTML += `<option value="${opt}" ${selected}>${opt}</option>`;
                    });
                } else {
                    stockSelectHTML += `<option value="${currentStock}" selected>${currentStock}</option>`;
                    fixedOptions.forEach(opt => {
                        stockSelectHTML += `<option value="${opt}">${opt}</option>`;
                    });
                    stockSelectHTML += `<option value="">ー (空欄)</option>`;
                }
                stockSelectHTML += `</select>`;

                const displayTime = cleanTimeFormat(item.time);
                const displayCarNum = removeAllSpaces(item.carNum);

                // 🌟 クラスの赤字判定用スタイル
                const currentClass = item.carClass || '';
                let classTextColor = redClasses.includes(currentClass) ? 'text-rose-600 font-bold text-center' : 'text-slate-700 text-center';
                if (item.departure) classTextColor = 'text-slate-400/75 text-center';

                tr.innerHTML = `
                    <td class="p-2 text-center border-r"><input type="checkbox" ${item.arrival ? 'checked' : ''} onchange="toggleArrival('${item.id}', this.checked)"></td>
                    <td class="p-2 text-center border-r"><input type="checkbox" ${item.departure ? 'checked' : ''} onchange="toggleDeparture('${item.id}', this.checked)"></td>
                    <td class="p-1 border-r"><input type="text" value="${displayTime}" onchange="updateField('${item.id}', 'time', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.bookingNo||'ー'}" onchange="updateField('${item.id}', 'bookingNo', this.value)" class="w-full text-center bg-transparent font-mono text-[11px] text-slate-500"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.company||''}" onchange="updateField('${item.id}', 'company', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.name||''}" onchange="updateField('${item.id}', 'name', this.value)" class="w-full bg-transparent"></td>
                    
                    <td class="p-1 border-r"><input type="text" value="${currentClass}" onchange="updateField('${item.id}', 'carClass', this.value)" class="w-full bg-transparent ${classTextColor}"></td>
                    
                    <td class="p-1 border-r"><input type="text" value="${item.carType||''}" onchange="updateField('${item.id}', 'carType', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${displayCarNum}" onchange="updateField('${item.id}', 'carNum', this.value)" class="w-full text-center bg-transparent"></td>
                    
                    <td class="p-0.5 border-r">${stockSelectHTML}</td>
                    
                    <td class="p-1 border-r"><input type="text" value="${item.memo||''}" onchange="updateField('${item.id}', 'memo', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.returnStore||''}" onchange="updateField('${item.id}', 'returnStore', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.attach1||''}" onchange="updateField('${item.id}', 'attach1', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.attach2||''}" onchange="updateField('${item.id}', 'attach2', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.attach3||''}" onchange="updateField('${item.id}', 'attach3', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-2 text-center"><button onclick="deleteRow('${item.id}')" class="text-slate-400 hover:text-rose-600"><i class="fa-solid fa-trash-can"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.processExcelImport = async function() {
            const rawText = document.getElementById('import-area').value.trim();
            const lines = rawText.split('\n'); if (lines.length < 2) return;
            
            const headers = lines[0].split('\t').map(h => h.trim());
            const indices = {};
            
            Object.keys(headerKeywords).forEach(key => {
                indices[key] = headers.findIndex(h => headerKeywords[key].some(kw => h.includes(kw)));
            });

            const batch = writeBatch(db);
            reservations.forEach(r => { batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', r.id)); });

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cells = lines[i].split('\t');
                const nid = 'res_' + Date.now() + '_' + i;
                
                let timeVal = indices.time !== -1 && cells[indices.time] ? cells[indices.time].trim() : "12:00";
                if(/^\d{4}$/.test(timeVal)) timeVal = timeVal.substring(0,2) + ":" + timeVal.substring(2,4);

                let stockVal = indices.stock !== -1 && cells[indices.stock] ? cells[indices.stock].trim() : "";
                if(stockVal === "西口広場前店") stockVal = "広場";
                if(stockVal === "広場２P" || stockVal === "広場2P") stockVal = "Ｄ";

                let rawCarNum = indices.carNum !== -1 && cells[indices.carNum] ? cells[indices.carNum] : "ー";
                let carNumVal = removeAllSpaces(rawCarNum);

                let rawAttach1 = indices.attach1 !== -1 && cells[indices.attach1] ? cells[indices.attach1] : "ー";
                let rawAttach2 = indices.attach2 !== -1 && cells[indices.attach2] ? cells[indices.attach2] : "ー";
                let rawAttach3 = indices.attach3 !== -1 && cells[indices.attach3] ? cells[indices.attach3] : "ー";

                const item = {
                    id: nid, arrival: false, departure: false,
                    time: timeVal,
                    bookingNo: indices.bookingNo !== -1 && cells[indices.bookingNo] ? cells[indices.bookingNo].trim() : "ー",
                    company: indices.company !== -1 && cells[indices.company] ? cells[indices.company].trim() : "ー",
                    name: indices.name !== -1 && cells[indices.name] ? cells[indices.name].trim() : "ー",
                    carClass: indices.carClass !== -1 && cells[indices.carClass] ? cells[indices.carClass].trim() : "ー", // 🌟 クラスコードインポート
                    carType: indices.carType !== -1 && cells[indices.carType] ? cells[indices.carType].trim() : "ー",
                    carNum: carNumVal,
                    stock: stockVal,
                    memo: indices.memo !== -1 && cells[indices.memo] ? cells[indices.memo].trim() : "ー",
                    returnStore: indices.returnStore !== -1 && cells[indices.returnStore] ? cells[indices.returnStore].trim() : "ー",
                    attach1: formatAttachValue(rawAttach1),
                    attach2: formatAttachValue(rawAttach2),
                    attach3: formatAttachValue(rawAttach3)
                };
                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', nid), item);
            }
            await batch.commit(); closeImportModal(); document.getElementById('import-area').value = ""; showToast("クラスコードを含む全データをインポートしました！");
        };

        window.toggleArrival = async function(id, checked) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), { arrival: checked, arrivalTimestamp: checked ? Date.now() : null }); };
        window.toggleDeparture = async function(id, checked) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), { departure: checked }); };
        
        window.updateField = async function(id, field, value) { 
            let v = value.trim(); 
            if(field=='stock') {
                if(v=='西口広場前店') v='広場';
                if(v=='広場２P' || v=='広場2P') v='Ｄ';
            }
            if(field=='carNum') v = removeAllSpaces(v);
            if(field=='attach1' || field=='attach2' || field=='attach3') v = formatAttachValue(v);
            
            const d = {}; d[field] = v; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), d); 
        };
        
        window.deleteRow = async function(id) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id)); };

        window.openAddModal = function() {
            document.getElementById('add-time').value = "12:00";
            document.getElementById('add-bookingNo').value = "";
            document.getElementById('add-company').value = "";
            document.getElementById('add-name').value = "";
            document.getElementById('add-carClass').value = ""; // 🌟
            document.getElementById('add-carType').value = "";
            document.getElementById('add-carNum').value = "";
            document.getElementById('add-stock').value = "";
            document.getElementById('add-returnStore').value = "";
            document.getElementById('add-memo').value = "";
            document.getElementById('add-attach1').value = "";
            document.getElementById('add-attach2').value = "";
            document.getElementById('add-modal').classList.remove('hidden');
        };

        window.closeAddModal = function() {
            document.getElementById('add-modal').classList.add('hidden');
        };

        window.submitNewReservationForm = async function() {
            const nid = 'res_' + Date.now();
            const timeVal = document.getElementById('add-time').value.trim() || "12:00";
            const bookingNoVal = document.getElementById('add-bookingNo').value.trim() || "ー";
            const companyVal = document.getElementById('add-company').value.trim() || "新規顧客";
            const nameVal = document.getElementById('add-name').value.trim() || "ー";
            const carClassVal = document.getElementById('add-carClass').value.trim() || "ー"; // 🌟
            const carTypeVal = document.getElementById('add-carType').value.trim() || "ー";
            const carNumVal = removeAllSpaces(document.getElementById('add-carNum').value);
            const stockVal = document.getElementById('add-stock').value;
            const returnStoreVal = document.getElementById('add-returnStore').value.trim() || "ー";
            const memoVal = document.getElementById('add-memo').value.trim() || "ー";
            
            const attach1Val = formatAttachValue(document.getElementById('add-attach1').value);
            const attach2Val = formatAttachValue(document.getElementById('add-attach2').value);

            const newItem = {
                id: nid, arrival: false, departure: false,
                time: timeVal, bookingNo: bookingNoVal, company: companyVal,
                name: nameVal, carClass: carClassVal, carType: carTypeVal, carNum: carNumVal,
                stock: stockVal, memo: memoVal, returnStore: returnStoreVal,
                attach1: attach1Val, attach2: attach2Val, attach3: "ー"
            };

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', nid), newItem);
            closeAddModal();
            showToast(`${companyVal} 様の新規予約を登録しました！`);
        };

        function updateStats() {
            const total = reservations.length;
            const active = reservations.filter(r=>r.arrival && !r.departure).length;
            const completed = reservations.filter(r=>r.departure).length;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-completed').textContent = completed;

            document.getElementById('stat-progress-count').textContent = `${completed}/${total}`;

            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('stat-progress-percent').textContent = `${percentage}%`;
            document.getElementById('stat-progress-bar').style.width = `${percentage}%`;
        }

        function playSynthSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1318.51, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.8);
            } catch (e) {}
        }

        window.openImportModal = function() { document.getElementById('import-modal').classList.remove('hidden'); };
        window.closeImportModal = function() { document.getElementById('import-modal').classList.add('hidden'); };
        window.confirmClearData = function() { document.getElementById('clear-modal').classList.remove('hidden'); };
        window.closeClearModal = function() { document.getElementById('clear-modal').classList.add('hidden'); };
        window.clearAllData = async function() {
            const batch = writeBatch(db);
            reservations.forEach(r => { batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', r.id)); });
            await batch.commit(); closeClearModal();
        };
        function showToast(m) { document.getElementById('toast-msg').textContent = m; document.getElementById('toast').classList.remove('translate-y-20', 'opacity-0'); setTimeout(()=>document.getElementById('toast').classList.add('translate-y-20', 'opacity-0'), 3000); }

        window.onload = async function() {
            setupEnvironment();
            await signInAnonymously(auth); 
            initRealtimeSync();
        };
    </script>
