<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約自動管理システム CLOUD PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;750;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans JP', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .row-hover:hover { background-color: #f8fafc !important; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen font-sans flex flex-col antialiased">

    <script id="firebase-config-script">
        const firebaseConfig = {
            apiKey: "AIzaSyBKPgBROp1b-ONmSOc6qMRozs-_Pm5pbJ0",

  authDomain: "auto-rent-system-52efe.firebaseapp.com",

  projectId: "auto-rent-system-52efe",

  storageBucket: "auto-rent-system-52efe.firebasestorage.app",
        };
    </script>
    <div id="cloud-lock-screen" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-4 z-[100] transition-all duration-300">
        <div class="bg-white max-w-xl w-full rounded-2xl shadow-2xl border border-slate-200 p-8 flex flex-col items-center gap-6">
            <div id="lock-icon-container" class="w-16 h-16 rounded-full bg-rose-50 border border-rose-100 text-rose-600 flex items-center justify-center text-2xl animate-bounce">
                <i class="fa-solid fa-cloud-slash"></i>
            </div>
            <div class="w-full">
                <h2 class="text-lg font-bold text-slate-900 text-center">共有クラウド（Firebase）接続エラー</h2>
                <div id="lock-screen-reason" class="text-xs text-slate-600 mt-5 leading-relaxed bg-slate-50 p-5 rounded-xl border border-slate-150 text-left">
                    現在、複数端末の同期用クラウドに接続されていません。
                </div>
            </div>
            <button onclick="bypassLockToLocalMode()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold rounded-xl shadow transition flex items-center justify-center gap-2 cursor-pointer">
                <i class="fa-solid fa-wand-magic-sparkles text-amber-400"></i> Firebaseなしで試す（ローカル体験モード）
            </button>
        </div>
    </div>

    <div id="admin-view" class="flex-1 flex flex-col opacity-20 pointer-events-none transition-opacity duration-300">
        <header class="bg-slate-900 text-white shadow-md border-b border-slate-800 px-6 py-4 shrink-0">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div id="connection-badge-icon" class="bg-amber-600 text-white p-2.5 rounded-xl shadow-lg flex items-center justify-center">
                        <i id="cloud-icon" class="fa-solid fa-database text-xl"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-1.5">
                            <h1 class="text-lg font-black tracking-tight">予約状況 自動管理 system</h1>
                            <span id="live-badge" class="text-[9px] text-amber-500 font-bold bg-amber-950/80 px-2.5 py-0.5 rounded border border-amber-900">SINGLE RUN</span>
                        </div>
                    </div>
                </div>
                
                <div id="mobile-bell-area" class="hidden md:flex items-center">
                    <button onclick="requestMobileNotification()" class="bg-amber-500 hover:bg-amber-600 active:scale-95 text-slate-900 text-xs font-black px-4 py-2.5 rounded-xl shadow transition flex items-center gap-2 cursor-pointer border border-amber-400">
                        <i class="fa-solid fa-bell animate-bounce"></i> 📲 このスマホの通知をONにする
                    </button>
                </div>

                <div class="flex items-center gap-2 flex-wrap">
                    <button onclick="addEmptyReservation()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow transition flex items-center gap-2 cursor-pointer"><i class="fa-solid fa-plus"></i> 直接追加</button>
                    <button onclick="openImportModal()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow transition flex items-center gap-2 cursor-pointer"><i class="fa-solid fa-file-import"></i> エクセル貼り付け</button>
                    <button onclick="launchMonitorWindow()" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow transition flex items-center gap-2 cursor-pointer"><i class="fa-solid fa-desktop text-emerald-400"></i> 📺 モニター画面</button>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 flex flex-col gap-6">
            <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col flex-1">
                <div class="p-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span id="table-indicator" class="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                        <h2 id="table-title" class="text-xs font-black text-slate-700 tracking-wider uppercase">データシート</h2>
                    </div>
                    <div id="sync-indicator" class="text-[10px] text-amber-600 bg-amber-50 px-2.5 py-1 rounded-lg">読み込み中...</div>
                </div>

                <div class="flex-1 overflow-x-auto min-h-[400px]">
                    <table class="w-full text-left border-collapse table-fixed min-w-[1740px]">
                        <thead>
                            <tr class="bg-slate-900 text-white text-[11px] uppercase tracking-wider font-bold">
                                <th class="p-4 w-16 text-center font-bold">来店</th>
                                <th class="p-4 w-16 text-center font-bold">出発済</th>
                                <th class="p-4 w-24 text-center font-bold">予約時間</th>
                                <th class="p-4 w-48 text-center font-bold">お客様名</th>
                                <th class="p-4 w-52 text-center font-bold">配車住所</th>
                                <th class="p-4 w-36 text-center font-bold">車種</th>
                                <th class="p-4 w-32 text-center font-bold">車番</th>
                                <th class="p-4 w-28 text-center font-bold">在庫</th>
                                <th class="p-4 w-80 text-center font-bold">備考</th>
                                <th class="p-4 w-36 text-center font-bold">返却店舗</th>
                                <th class="p-4 w-36 text-center font-bold">添付品1</th>
                                <th class="p-4 w-36 text-center font-bold">添付品2</th>
                                <th class="p-4 w-36 text-center font-bold">添付品3</th>
                                <th class="p-4 w-16 text-center font-bold">操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-150 text-xs"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="import-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl border p-6 flex flex-col gap-4">
            <textarea id="import-area" oninput="previewImport()" placeholder="ここにエクセルデータを貼り付け..." class="w-full h-40 p-4 border rounded-xl font-mono text-[11px] bg-slate-50 resize-none"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closeImportModal()" class="px-4 py-2 bg-white border text-slate-700 text-xs font-bold rounded-lg">キャンセル</button>
                <button onclick="processExcelImport()" class="px-5 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow">一斉反映</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, writeBatch, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let reservations = [];
        let currentUser = null;
        let lastArrivalState = {}; 
        let db = null;
        let auth = null;
        let appId = 'default-app-id';
        let isCloudMode = false; 

        // 🌟【1枚完結通知システム】ブラウザが通知を受け取れる状態かチェック
        function checkNotificationSystem() {
            const bellArea = document.getElementById('mobile-bell-area');
            if ('Notification' in window) {
                bellArea.classList.remove('hidden'); // ボタンを表示
                if (Notification.permission === 'granted') {
                    bellArea.innerHTML = `<span class="text-xs font-bold text-emerald-400 bg-emerald-950 px-3 py-1.5 rounded-xl border border-emerald-900"><i class="fa-solid fa-circle-check"></i> スマホ通知連動中</span>`;
                }
            }
        }

        // 🌟【1枚完結通知システム】ボタンが押されたらスマホに許可を求める
        window.requestMobileNotification = function() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    alert('通知の連携に成功しました！スマホがスリープでも振動とポップアップで通知が届きます。');
                    new Notification("CLOUD PRO", { body: "通知連動テストに成功しました！" });
                    checkNotificationSystem();
                } else {
                    alert('通知が拒否されました。スマホの設定からブラウザの通知許可をオンにしてください。');
                }
            });
        };

        // 🌟【1枚完結通知システム】バックグラウンド・スリープ時でも強制プッシュ通知を出す関数
        function firePushNotification(clientName) {
            if ('Notification' in window && Notification.permission === 'granted') {
                try {
                    // バイブレーションと音を伴う公式ポップアップ通知
                    const notification = new Notification("【CLOUD PRO】来店通知", {
                        body: `${clientName} 様がご来店されました。確認してください！`,
                        icon: "https://via.placeholder.com/192/007bff/ffffff?text=CP",
                        tag: "visit-alert",
                        renotify: true
                    });
                    
                    // Android等のバイブ強制作動
                    if ('vibrate' in navigator) {
                        navigator.vibrate([300, 100, 300, 100, 300]); 
                    }
                } catch (e) {
                    console.log("Notification error caught", e);
                }
            }
        }

        // --- Firebase 環境判定 ---
        function setupEnvironment() {
            if (typeof firebaseConfig !== 'undefined' && firebaseConfig && firebaseConfig.apiKey) {
                try {
                    appId = firebaseConfig.projectId;
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isCloudMode = true;
                    document.getElementById('cloud-lock-screen').classList.add('hidden');
                    document.getElementById('admin-view').classList.remove('pointer-events-none');
                    document.getElementById('admin-view').style.opacity = "1";
                    checkNotificationSystem();
                } catch (e) {
                    bypassLockToLocalMode();
                }
            } else {
                bypassLockToLocalMode();
            }
        }

        // リアルタイムクラウド同期
        function initRealtimeSync() {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
                    onSnapshot(collectionRef, (snapshot) => {
                        const updated = [];
                        snapshot.forEach((doc) => { updated.push({ id: doc.id, ...doc.data() }); });

                        // 🌟データが更新された際、新しく「来店」がついたデータがあれば通知を発動
                        updated.forEach(item => {
                            if (item.arrival && item.arrivalTimestamp) {
                                const wasAlreadyArrived = lastArrivalState[item.id] === true;
                                const isVeryRecent = (Date.now() - item.arrivalTimestamp) < 3500;
                                if (!wasAlreadyArrived && isVeryRecent) {
                                    playSynthSound(); // シンセ音を鳴らす
                                    firePushNotification(item.company || "新規"); // 🌟スマホ通知を強制発報！
                                }
                            }
                            lastArrivalState[item.id] = item.arrival;
                        });

                        reservations = updated;
                        renderTable();
                        document.getElementById('sync-indicator').textContent = "クラウド同期中";
                    });
                }
            });
        }

        // --- テーブル描画 & ソート（ボタンを押した順） ---
        function sortData(list) {
            return [...list].sort((a, b) => {
                const aDep = a.departure ? 1 : 0; const bDep = b.departure ? 1 : 0;
                if (aDep !== bDep) return aDep - bDep;
                const aArr = a.arrival ? 1 : 0; const bArr = b.arrival ? 1 : 0;
                if (aArr !== bArr) return bArr - aArr;
                if (a.arrival && b.arrival) {
                    return (a.arrivalTimestamp || 0) - (b.arrivalTimestamp || 0);
                }
                return (a.time || '').localeCompare(b.time || '');
            });
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            if (!tbody) return; tbody.innerHTML = '';
            const sorted = sortData(reservations);
            sorted.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = `border-b ${item.departure ? 'bg-slate-100 text-slate-400' : item.arrival ? 'bg-emerald-50 text-slate-800 border-l-4 border-emerald-500' : 'bg-white'}`;
                
                let stockColor = item.stock === '広場' ? 'text-rose-600 font-bold' : 'text-slate-800';
                const selectStockHTML = `
                    <select onchange="updateField('${item.id}', 'stock', this.value)" class="w-full bg-transparent text-center ${stockColor}">
                        <option value="" ${item.stock === '' ? 'selected' : ''}>ー</option>
                        <option value="広場" ${item.stock === '広場' ? 'selected' : ''}>広場</option>
                    </select>
                `;

                tr.innerHTML = `
                    <td class="p-2 text-center"><input type="checkbox" ${item.arrival ? 'checked' : ''} onchange="toggleArrival('${item.id}', this.checked)"></td>
                    <td class="p-2 text-center"><input type="checkbox" ${item.departure ? 'checked' : ''} onchange="toggleDeparture('${item.id}', this.checked)"></td>
                    <td class="p-1"><input type="text" value="${item.time || ''}" onchange="updateField('${item.id}', 'time', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.company || ''}" onchange="updateField('${item.id}', 'company', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.name || ''}" onchange="updateField('${item.id}', 'name', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.carType || ''}" onchange="updateField('${item.id}', 'carType', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.carNum || ''}" onchange="updateField('${item.id}', 'carNum', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-1">${selectStockHTML}</td>
                    <td class="p-1"><input type="text" value="${item.memo || ''}" onchange="updateField('${item.id}', 'memo', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.returnStore || ''}" onchange="updateField('${item.id}', 'returnStore', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.attach1 || ''}" onchange="updateField('${item.id}', 'attach1', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.attach2 || ''}" onchange="updateField('${item.id}', 'attach2', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1"><input type="text" value="${item.attach3 || ''}" onchange="updateField('${item.id}', 'attach3', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-2 text-center"><button onclick="deleteRow('${item.id}')" class="text-slate-400 hover:text-rose-600"><i class="fa-solid fa-trash-can"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- データ更新処理 ---
        window.toggleArrival = async function(id, checked) {
            const val = { arrival: checked, arrivalTimestamp: checked ? Date.now() : null };
            if (isCloudMode) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), val); }
        };
        window.toggleDeparture = async function(id, checked) {
            if (isCloudMode) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), { departure: checked }); }
        };
        window.updateField = async function(id, field, value) {
            const d = {}; d[field] = value.trim();
            if (isCloudMode) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), d); }
        };
        window.deleteRow = async function(id) {
            if (isCloudMode) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id)); }
        };
        window.addEmptyReservation = async function() {
            const nid = 'res_' + Date.now();
            const newItem = { id: nid, arrival: false, departure: false, time: "12:00", company: "新規顧客", name: "ー", carType: "ー", carNum: "ー", stock: "", memo: "ー", returnStore: "ー", attach1: "ー", attach2: "ー", attach3: "ー" };
            if (isCloudMode) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', nid), newItem); }
        };

        window.bypassLockToLocalMode = function() {
            isCloudMode = false;
            document.getElementById('cloud-lock-screen').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('pointer-events-none');
            document.getElementById('admin-view').style.opacity = "1";
            document.getElementById('sync-indicator').textContent = "ローカル保存モード";
        };

        // シンセサイザー音源再生
        function playSynthSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1318.51, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.8);
            } catch (e) {}
        }

        window.onload = async function() {
            setupEnvironment();
            if (isCloudMode) {
                await signInAnonymously(auth);
                initRealtimeSync();
            }
        };
    </script>
</body>
</html>
