    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, writeBatch, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let reservations = [];
        let currentUser = null;
        let lastArrivalState = {}; 
        let db = null; let auth = null; let appId = 'default-app-id';

        const headerKeywords = {
            time: ["出発予定年月日時分", "予約時間", "時間"],
            company: ["借受人名", "お客様名", "会社名"],
            name: ["配車予定住所", "配車住所"],
            carType: ["車名", "車種"],
            carNum: ["登録№（表示用）", "車番"],
            stock: ["在庫営業店舗名", "在庫営業店舗", "在庫"],
            memo: ["連絡事項", "備考"],
            returnStore: ["帰着予定営業店舗名", "返却店舗"],
            attach1: ["添付品名１"],
            attach2: ["添付品名２"],
            attach3: ["添付品名３"]
        };

        function checkNotificationSystem() {
            const bellArea = document.getElementById('mobile-bell-area');
            if ('Notification' in window) {
                bellArea.classList.remove('hidden');
                if (Notification.permission === 'granted') {
                    bellArea.innerHTML = `<span class="text-xs font-bold text-emerald-400 bg-emerald-950 px-3 py-1.5 rounded-xl border border-emerald-900"><i class="fa-solid fa-circle-check"></i> スマホ通知連動中</span>`;
                }
            }
        }

        window.requestMobileNotification = function() {
            Notification.requestPermission().then(p => {
                if (p === 'granted') {
                    new Notification("CLOUD PRO", { body: "通知連動テストに成功しました！" });
                    checkNotificationSystem();
                }
            });
        };

        function firePushNotification(name) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification("【CLOUD PRO】来店通知", { body: `${name} 様がご来店されました。`, tag: "visit-alert", renotify: true });
                if ('vibrate' in navigator) navigator.vibrate([300, 100, 300]);
            }
        }

        function setupEnvironment() {
            appId = firebaseConfig.projectId;
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app); db = getFirestore(app);
            checkNotificationSystem();
        }

        function initRealtimeSync() {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
                    onSnapshot(collectionRef, (snapshot) => {
                        const updated = [];
                        snapshot.forEach((doc) => { updated.push({ id: doc.id, ...doc.data() }); });
                        
                        updated.forEach(item => {
                            if (item.arrival && item.arrivalTimestamp) {
                                if (!lastArrivalState[item.id]) {
                                    playSynthSound();
                                    firePushNotification(item.company || "新規お客様");
                                }
                            }
                            lastArrivalState[item.id] = item.arrival;
                        });

                        reservations = updated; renderTable(); updateStats();
                    });
                }
            });
        }

        function sortData(list) {
            return [...list].sort((a, b) => {
                const aDep = a.departure ? 1 : 0; const bDep = b.departure ? 1 : 0;
                if (aDep !== bDep) return aDep - bDep;

                if (a.arrival && b.arrival) {
                    return (a.arrivalTimestamp || 0) - (b.arrivalTimestamp || 0);
                }
                if (a.arrival && !b.arrival) return -1;
                if (!a.arrival && b.arrival) return 1;

                const cleanTime = (t) => {
                    if (!t) return '99:99';
                    let match = t.match(/(\d{1,2}):(\d{2})/);
                    if (match) {
                        let h = match[1].padStart(2, '0');
                        let m = match[2];
                        return `${h}:${m}`;
                    }
                    return t.padStart(5, '0');
                };

                return cleanTime(a.time).localeCompare(cleanTime(b.time));
            });
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const rowCount = document.getElementById('row-count');
            if (!tbody) return; tbody.innerHTML = '';
            rowCount.textContent = reservations.length;
            const sorted = sortData(reservations);
            sorted.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = `row-hover border-b ${item.departure ? 'bg-slate-100 text-slate-400' : item.arrival ? 'bg-emerald-50 text-slate-800 border-l-[5px] border-emerald-500' : 'bg-white'}`;
                
                // 在庫の赤字スタイル判定（広場のみ適用）
                const currentStock = item.stock || '';
                const isHiroba = currentStock === '広場' || currentStock === '西口広場前店';
                let stockTextColor = isHiroba ? 'text-rose-600 font-black text-center' : 'text-slate-800 text-center font-medium';
                if (item.departure) stockTextColor = 'text-slate-400/75 text-center';

                // 🌟 新しくご指定いただいた半角・全角等の表記に完全一致した5大拠点
                const fixedOptions = ["広場", "ﾘｯﾄP", "ママカリＰ", "広場3P", "新保"];
                
                let stockSelectHTML = `<select onchange="updateField('${item.id}', 'stock', this.value)" class="w-full h-8 bg-transparent cursor-pointer ${stockTextColor}">`;
                
                if (currentStock === '' || currentStock === 'ー' || fixedOptions.includes(currentStock)) {
                    stockSelectHTML += `<option value="">ー</option>`;
                    fixedOptions.forEach(opt => {
                        const selected = currentStock === opt ? 'selected' : '';
                        stockSelectHTML += `<option value="${opt}" ${selected}>${opt}</option>`;
                    });
                } else {
                    // エクセルから上記以外の特殊な名前が流れてきた場合も一番上に残す
                    stockSelectHTML += `<option value="${currentStock}" selected>${currentStock}</option>`;
                    fixedOptions.forEach(opt => {
                        stockSelectHTML += `<option value="${opt}">${opt}</option>`;
                    });
                    stockSelectHTML += `<option value="">ー (空欄)</option>`;
                }
                stockSelectHTML += `</select>`;

                tr.innerHTML = `
                    <td class="p-2 text-center border-r"><input type="checkbox" ${item.arrival ? 'checked' : ''} onchange="toggleArrival('${item.id}', this.checked)"></td>
                    <td class="p-2 text-center border-r"><input type="checkbox" ${item.departure ? 'checked' : ''} onchange="toggleDeparture('${item.id}', this.checked)"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.time||''}" onchange="updateField('${item.id}', 'time', this.value)" class="w-full text-center bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.company||''}" onchange="updateField('${item.id}', 'company', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.name||''}" onchange="updateField('${item.id}', 'name', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.carType||''}" onchange="updateField('${item.id}', 'carType', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.carNum||''}" onchange="updateField('${item.id}', 'carNum', this.value)" class="w-full text-center bg-transparent"></td>
                    
                    <td class="p-0.5 border-r">${stockSelectHTML}</td>
                    
                    <td class="p-1 border-r"><input type="text" value="${item.memo||''}" onchange="updateField('${item.id}', 'memo', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.returnStore||''}" onchange="updateField('${item.id}', 'returnStore', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.attach1||''}" onchange="updateField('${item.id}', 'attach1', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.attach2||''}" onchange="updateField('${item.id}', 'attach2', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-1 border-r"><input type="text" value="${item.attach3||''}" onchange="updateField('${item.id}', 'attach3', this.value)" class="w-full bg-transparent"></td>
                    <td class="p-2 text-center"><button onclick="deleteRow('${item.id}')" class="text-slate-400 hover:text-rose-600"><i class="fa-solid fa-trash-can"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.processExcelImport = async function() {
            const rawText = document.getElementById('import-area').value.trim();
            const lines = rawText.split('\n'); if (lines.length < 2) return;
            
            const headers = lines[0].split('\t').map(h => h.trim());
            const indices = {};
            
            Object.keys(headerKeywords).forEach(key => {
                indices[key] = headers.findIndex(h => headerKeywords[key].some(kw => h.includes(kw)));
            });

            const batch = writeBatch(db);
            reservations.forEach(r => { batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', r.id)); });

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cells = lines[i].split('\t');
                const nid = 'res_' + Date.now() + '_' + i;
                
                let timeVal = indices.time !== -1 && cells[indices.time] ? cells[indices.time].trim() : "12:00";
                if(/^\d{4}$/.test(timeVal)) timeVal = timeVal.substring(0,2) + ":" + timeVal.substring(2,4);

                let stockVal = indices.stock !== -1 && cells[indices.stock] ? cells[indices.stock].trim() : "";
                if(stockVal === "西口広場前店") stockVal = "広場";

                const item = {
                    id: nid, arrival: false, departure: false,
                    time: timeVal,
                    company: indices.company !== -1 && cells[indices.company] ? cells[indices.company].trim() : "ー",
                    name: indices.name !== -1 && cells[indices.name] ? cells[indices.name].trim() : "ー",
                    carType: indices.carType !== -1 && cells[indices.carType] ? cells[indices.carType].trim() : "ー",
                    carNum: indices.carNum !== -1 && cells[indices.carNum] ? cells[indices.carNum].trim() : "ー",
                    stock: stockVal,
                    memo: indices.memo !== -1 && cells[indices.memo] ? cells[indices.memo].trim() : "ー",
                    returnStore: indices.returnStore !== -1 && cells[indices.returnStore] ? cells[indices.returnStore].trim() : "ー",
                    attach1: indices.attach1 !== -1 && cells[indices.attach1] ? cells[indices.attach1].trim() : "ー",
                    attach2: indices.attach2 !== -1 && cells[indices.attach2] ? cells[indices.attach2].trim() : "ー",
                    attach3: indices.attach3 !== -1 && cells[indices.attach3] ? cells[indices.attach3].trim() : "ー"
                };
                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', nid), item);
            }
            
            await batch.commit(); 
            closeImportModal(); 
            document.getElementById('import-area').value = "";
            showToast("指定の文字列表記でプルダウンを設定しました！");
        };

        window.toggleArrival = async function(id, checked) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), { arrival: checked, arrivalTimestamp: checked ? Date.now() : null }); };
        window.toggleDeparture = async function(id, checked) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), { departure: checked }); };
        window.updateField = async function(id, field, value) { 
            let v = value.trim(); if(field=='stock' && v=='西口広場前店') v='広場';
            const d = {}; d[field] = v; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id), d); 
        };
        window.deleteRow = async function(id) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', id)); };
        window.addEmptyReservation = async function() {
            const nid = 'res_' + Date.now();
            const newItem = { id: nid, arrival: false, departure: false, time: "12:00", company: "新規顧客", name: "ー", carType: "ー", carNum: "ー", stock: "", memo: "ー", returnStore: "ー", attach1: "ー", attach2: "ー", attach3: "ー" };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', nid), newItem);
        };

        function updateStats() {
            document.getElementById('stat-total').textContent = reservations.length;
            document.getElementById('stat-active').textContent = reservations.filter(r=>r.arrival && !r.departure).length;
            document.getElementById('stat-completed').textContent = reservations.filter(r=>r.departure).length;
        }

        function playSynthSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(1318.51, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.8);
            } catch (e) {}
        }

        window.openImportModal = function() { document.getElementById('import-modal').classList.remove('hidden'); };
        window.closeImportModal = function() { document.getElementById('import-modal').classList.add('hidden'); };
        window.confirmClearData = function() { document.getElementById('clear-modal').classList.remove('hidden'); };
        window.closeClearModal = function() { document.getElementById('clear-modal').classList.add('hidden'); };
        window.clearAllData = async function() {
            const batch = writeBatch(db);
            reservations.forEach(r => { batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'reservations', r.id)); });
            await batch.commit(); closeClearModal();
        };
        function showToast(m) { document.getElementById('toast-msg').textContent = m; document.getElementById('toast').classList.remove('translate-y-20', 'opacity-0'); setTimeout(()=>document.getElementById('toast').classList.add('translate-y-20', 'opacity-0'), 3000); }

        window.onload = async function() {
            setupEnvironment();
            await signInAnonymously(auth); 
            initRealtimeSync();
        };
    </script>
</body>
